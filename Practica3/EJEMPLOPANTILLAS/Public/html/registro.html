<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/FormStyles.css" type="text/css" />
</head>
<body>

    <div class="glass-card">
        <h2>Crear Cuenta</h2>
        
        <form id="registroForm" action="/crearCuenta" method="POST" novalidate>
            <div class="input-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Yaretzi Guevara" required autofocus>
                <span class="mensaje-error" id="error-nombre"></span>
            </div>

            <div class="input-group">
                <label for="correo">Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                <span class="mensaje-error" id="error-correo"></span>
            </div>
            
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" name="password" maxlength="15" required>
                <span class="mensaje-error" id="error-password"></span>
            </div>
            
            <div class="input-group">
                <label for="confirmPassword">Confirmar Contraseña:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" maxlength="15" required>
                <span class="mensaje-error" id="error-confirmPassword"></span>
            </div>

            <div class="input-group">
                <label for="preguntaSecreta">Pregunta Secreta:</label>
                <select id="preguntaSecreta" name="preguntaSecreta" required>
                    <option value="" disabled selected>Selecciona una pregunta...</option>
                    <option value="mascota">¿Nombre de tu primera mascota?</option>
                    <option value="escuela">¿Nombre de tu primera escuela?</option>
                    <option value="ciudad">¿En qué ciudad naciste?</option>
                </select>
                <span class="mensaje-error" id="error-preguntaSecreta"></span>
            </div>

            <div class="input-group">
                <label for="respuestaSecreta">Respuesta Secreta:</label>
                <input type="text" id="respuestaSecreta" name="respuestaSecreta" placeholder="Tu respuesta" required>
                <span class="mensaje-error" id="error-respuestaSecreta"></span>
            </div>

            <button type="submit" class="btn-signin">Registrarse</button>

            <p class="footer-text">
                ¿Ya tienes cuenta? <a href="/">Ingresa aquí</a>
            </p>
        </form>

        <pre id="resultado"></pre>
    </div>

    <script src="../js/validateRegistro.js"></script>
    
    <div id="modalRegistroExito" class="modal-overlay" style="display: none;">
    <div class="glass-card modal-content">
        <h2 id="modalTitulo">¡Registro Exitoso!</h2>
        <p id="modalMensaje" style="color: white; margin: 20px 0;"></p>
        <button id="btnIrALogin" class="btn-signin">Iniciar sesión aquí</button>
    </div>
</div>
</body>
</html>

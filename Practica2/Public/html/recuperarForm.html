<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperación</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/FormStyles.css" type="text/css" />
</head>
<body>

    <div class="glass-card">
        <h2>Recuperar contraseña</h2>

        <form id="recuperarForm" novalidate>
            
            <div id="seccion-email">
                <div class="input-group">
                    <label for="correo">Introduce tu email:</label>
                    <input type="email" id="correo" name="correo" placeholder="username@gmail.com" required autofocus>
                    <span class="mensaje-error" id="error-correo"></span>
                </div>
                <button type="button" id="btnCargarPregunta" class="btn-signin">Buscar Pregunta</button>
            </div>

            <div class="input-group" id="contenedor-pregunta" style="display:none; margin-top: 20px;">
                <p id="correoConfirmado" style="color: #00d4ff; font-size: 0.8rem; margin-bottom: 10px;"></p>
                
                <label>Pregunta Secreta:</label>
                <p id="textoPregunta" style="color: white; font-style: italic; margin-bottom: 15px; border-left: 3px solid #00d4ff; padding-left: 10px;"></p>                
                
                <label for="respuestaSecreta">Tu Respuesta:</label>
                <input type="text" id="respuestaSecreta" name="respuestaSecreta" placeholder="Escribe tu respuesta aquí" required>
                <span class="mensaje-error" id="error-respuestaSecreta"></span>
            </div>

            <button type="submit" class="btn-signin" id="btnRecuperar" style="display:none; margin-top: 20px;">Ver Contraseña</button>

            <p class="footer-text">
                ¿Ya la recordaste? <a href="/">Regresar al ingreso</a>
            </p>
        </form>
    </div>

    <div id="modalConfirmacion" class="modal-overlay" style="display: none;">
        <div class="glass-card modal-content">
            <h3>¡Identidad Confirmada!</h3>
            <p>Por seguridad, ahora debes ingresar tu nueva contraseña.</p>
            <button id="btnIrACambiar" class="btn-signin">Continuar</button>
        </div>
    </div>

    <div id="modalError" class="modal-overlay" style="display: none;">
        <div class="glass-card modal-content modal-error">
            <h2 id="tituloError">¡Error de datos!</h2>
            <p id="mensajeErrorModal" style="color: white; margin: 20px 0;"></p>
            <button id="btnCerrarError" class="btn-error">Intentar de nuevo</button>
        </div>
    </div>

    <script src="../js/validateRecuperar.js"></script>
</body>
</html>

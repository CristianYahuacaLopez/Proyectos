<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/FormStyles.css" type="text/css" />
</head>
<body>

    <div class="glass-card">
        <h2>Inicio de sesión</h2>

        <form id="loginForm" action="/validarLogin" method="POST" novalidate>
            
            <div class="input-group">
                <label for="correo">Email</label>
                <input type="email" id="correo" name="correo" placeholder="username@gmail.com" required autofocus>
                <span class="mensaje-error" id="error-correo"></span>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" maxlength="15" placeholder="••••••••" required>
                <span class="mensaje-error" id="error-password"></span>
            </div>


            <div class="form-options">
                <a href="/recuperarForm" class="forgot-link">Olvidaste tu contraseña?</a> 
            </div>

            <button type="submit" class="btn-signin">Ingresar</button>

            <p class="footer-text">
                No tienes cuenta?<a href="/registro">Crear una cuenta</a>
            </p>
        </form>

        <pre id="resultado"></pre>
    </div>

    <script src="../js/validateFormB.js"></script>
</body>
</html>

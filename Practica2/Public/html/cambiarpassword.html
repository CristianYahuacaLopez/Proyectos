<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Contraseña</title>
    <link rel="stylesheet" href="../css/FormStyles.css">
</head>
<body>
    <div class="glass-card">
        <h2>Nueva Contraseña</h2>
        <form id="cambioPasswordForm" action="/actualizarPassword" method="POST" novalidate>
            <input type="hidden" id="correo" name="correo">

            <div class="input-group">
                <label for="password">Nueva Contraseña:</label>
                <input type="password" id="password" name="password" maxlength="15" required autofocus>
                <span class="mensaje-error" id="error-password"></span>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar Contraseña:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" maxlength="15" required>
                <span class="mensaje-error" id="error-confirmPassword"></span>
            </div>

            <button type="submit" class="btn-signin">Actualizar y Guardar</button>
        </form>
        <pre id="resultado"></pre>
    </div>
    <div id="modalExito" class="modal-overlay" style="display: none;">
    <div class="glass-card modal-content">
        <h3 style="color: #0011ff;">¡Todo listo!</h3>
        <p style="color: white; margin: 15px 0;">Tu contraseña ha sido actualizada con éxito.</p>
        <button id="btnRegresar" class="btn-signin">Ir al Inicio</button>
    </div>
    </div>
    <script src="../js/validateCambio.js"></script>
</body>
</html>
